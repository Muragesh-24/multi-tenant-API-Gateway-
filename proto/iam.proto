syntax = "proto3";

package proto; // Changed to match your current setup

option go_package = "/proto";

service IAMService {
    rpc VerifyAPIKey (VerifyKeyRequest) returns (VerifyKeyResponse);
}

message VerifyKeyRequest {
    string api_key = 1;
    string tenant_id = 2;
}

message VerifyKeyResponse {
    bool is_valid = 1;
    string client_tier = 2; 
    string signature = 3;      // NEW: The RSA cryptographic signature
    string signed_payload = 4; // NEW: The exact string that was signed
}